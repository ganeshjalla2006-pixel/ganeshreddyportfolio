<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark-blue: #020b18;
    --mid-blue: #061a2e;
    --accent-blue: #0a3d62;
    --neon-green: #00ff88;
    --soft-green: #00c96b;
    --glow-green: #00ff8840;
    --moon-yellow: #fffbe6;
    --star-white: #e8f4ff;
    --text-main: #cde8ff;
    --text-dim: #7bafd4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Rajdhani', sans-serif; background: var(--dark-blue); color: var(--text-main); overflow-x: hidden; }
  #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  #bambooCanvas { position: fixed; bottom: 0; left: 0; width: 280px; height: 420px; z-index: 1; pointer-events: none; }
  .content { position: relative; z-index: 10; }
  nav { position: fixed; top: 0; width: 100%; background: rgba(2,11,24,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,255,136,0.15); z-index: 999; padding: 0 4%; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .nav-logo { font-family: 'Orbitron', monospace; font-size: 1.3rem; font-weight: 900; color: var(--neon-green); letter-spacing: 3px; text-shadow: 0 0 18px var(--neon-green); }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.95rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s, text-shadow 0.3s; }
  .nav-links a:hover { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
  #home { min-height: 100vh; display: flex; align-items: center; padding: 100px 6% 60px; position: relative; }
  .hero-content { max-width: 620px; }
  .hero-tag { font-family: 'Orbitron', monospace; font-size: 0.75rem; letter-spacing: 5px; color: var(--neon-green); text-transform: uppercase; margin-bottom: 1rem; opacity: 0; animation: fadeUp 0.8s 0.3s forwards; }
  .hero-name { font-family: 'Orbitron', monospace; font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 900; line-height: 1.1; color: #fff; text-shadow: 0 0 40px rgba(0,200,255,0.3); opacity: 0; animation: fadeUp 0.8s 0.5s forwards; margin-bottom: 0.4rem; }
  .hero-name span { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); }
  .hero-title { font-size: 1.4rem; font-weight: 300; color: var(--text-dim); letter-spacing: 3px; margin-bottom: 1.4rem; opacity: 0; animation: fadeUp 0.8s 0.7s forwards; }
  .hero-desc { font-size: 1.05rem; line-height: 1.8; color: #8ab4cc; margin-bottom: 2.2rem; opacity: 0; animation: fadeUp 0.8s 0.9s forwards; max-width: 520px; }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s 1.1s forwards; }
  .btn-primary { padding: 0.75rem 2rem; background: linear-gradient(135deg, var(--neon-green), #00b868); color: #020b18; font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 0 20px rgba(0,255,136,0.4); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 35px rgba(0,255,136,0.7); }
  .btn-outline { padding: 0.75rem 2rem; background: transparent; color: var(--neon-green); font-family: 'Orbitron', monospace; font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; border: 1px solid var(--neon-green); border-radius: 4px; cursor: pointer; text-decoration: none; transition: background 0.3s, box-shadow 0.3s; }
  .btn-outline:hover { background: rgba(0,255,136,0.1); box-shadow: 0 0 20px rgba(0,255,136,0.3); }

  /* ── HERO AVATAR with real photo ── */
  .hero-avatar { position: absolute; right: 8%; top: 50%; transform: translateY(-50%); opacity: 0; animation: fadeIn 1s 1.3s forwards; }
  .avatar-ring { width: 260px; height: 260px; border-radius: 50%; border: 2px solid rgba(0,255,136,0.5); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(0,255,136,0.25), inset 0 0 40px rgba(0,100,255,0.1); animation: pulse 3s ease-in-out infinite; }
  .avatar-inner { width: 230px; height: 230px; border-radius: 50%; border: 2px solid rgba(0,150,255,0.3); overflow: hidden; }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: brightness(1.05) contrast(1.05); }

  section { padding: 90px 6%; position: relative; }
  .section-header { text-align: center; margin-bottom: 3.5rem; }
  .section-label { font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 6px; color: var(--neon-green); text-transform: uppercase; margin-bottom: 0.6rem; display: block; }
  .section-title { font-family: 'Orbitron', monospace; font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 900; color: #fff; text-shadow: 0 0 30px rgba(0,200,255,0.2); }
  .section-line { width: 60px; height: 3px; background: linear-gradient(90deg, var(--neon-green), transparent); margin: 1rem auto 0; border-radius: 2px; }

  /* ── ABOUT photo ── */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; max-width: 1100px; margin: 0 auto; }
  .about-img-wrap { display: flex; justify-content: center; }
  .about-photo { width: 300px; height: 340px; border-radius: 20px; border: 2px solid rgba(0,255,136,0.35); overflow: hidden; box-shadow: 0 0 50px rgba(0,100,255,0.25), 0 0 25px rgba(0,255,136,0.15); position: relative; }
  .about-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: brightness(1.05) contrast(1.05); transition: transform 0.5s; }
  .about-photo:hover img { transform: scale(1.04); }
  .about-photo::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 70%, rgba(2,11,24,0.5)); pointer-events: none; }

  .about-info h3 { font-family: 'Orbitron', monospace; font-size: 1.5rem; color: #fff; margin-bottom: 1rem; }
  .about-info p { color: #8ab4cc; line-height: 1.9; font-size: 1.02rem; margin-bottom: 1.4rem; }
  .about-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 1.2rem; }
  .detail-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-dim); }
  .detail-item .di { color: var(--neon-green); font-size: 1rem; }

  #skills { background: rgba(6,26,46,0.3); }
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.4rem; max-width: 1100px; margin: 0 auto; }
  .skill-card { background: rgba(6,26,46,0.7); border: 1px solid rgba(0,255,136,0.12); border-radius: 12px; padding: 1.6rem 1rem; text-align: center; cursor: default; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; }
  .skill-card::before { content: ''; position: absolute; bottom: 0; left: 0; height: 2px; width: 0; background: var(--neon-green); transition: width 0.4s; }
  .skill-card:hover { transform: translateY(-6px); border-color: rgba(0,255,136,0.4); box-shadow: 0 8px 30px rgba(0,255,136,0.12); }
  .skill-card:hover::before { width: 100%; }
  .skill-icon { font-size: 2.4rem; margin-bottom: 0.7rem; display: block; }
  .skill-name { font-family: 'Orbitron', monospace; font-size: 0.75rem; font-weight: 700; color: #fff; letter-spacing: 1px; margin-bottom: 0.8rem; }
  .skill-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .skill-fill { height: 100%; background: linear-gradient(90deg, var(--neon-green), #00b868); border-radius: 2px; width: 0; transition: width 1.2s ease; box-shadow: 0 0 8px rgba(0,255,136,0.5); }
  .skill-percent { font-size: 0.75rem; color: var(--neon-green); margin-top: 0.4rem; display: block; }

  .edu-timeline { max-width: 800px; margin: 0 auto; position: relative; padding-left: 2rem; }
  .edu-timeline::before { content: ''; position: absolute; left: 0; top: 0; width: 2px; height: 100%; background: linear-gradient(to bottom, var(--neon-green), transparent); }
  .edu-item { margin-bottom: 2.5rem; padding: 1.6rem 2rem; background: rgba(6,26,46,0.6); border: 1px solid rgba(0,255,136,0.12); border-radius: 12px; position: relative; transition: border-color 0.3s, box-shadow 0.3s; }
  .edu-item:hover { border-color: rgba(0,255,136,0.35); box-shadow: 0 0 25px rgba(0,255,136,0.08); }
  .edu-item::before { content: ''; position: absolute; left: -2.6rem; top: 1.8rem; width: 12px; height: 12px; border-radius: 50%; background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); }
  .edu-year { font-family: 'Orbitron', monospace; font-size: 0.7rem; color: var(--neon-green); letter-spacing: 2px; margin-bottom: 0.4rem; }
  .edu-degree { font-size: 1.15rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
  .edu-college { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 0.6rem; }
  .edu-grade { display: inline-block; padding: 0.2rem 0.8rem; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); border-radius: 20px; font-size: 0.8rem; color: var(--neon-green); }

  #projects { background: rgba(6,26,46,0.3); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; max-width: 1150px; margin: 0 auto; }
  .project-card { background: rgba(6,26,46,0.7); border: 1px solid rgba(0,255,136,0.1); border-radius: 14px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; cursor: pointer; }
  .project-card:hover { transform: translateY(-8px); box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 30px rgba(0,255,136,0.1); border-color: rgba(0,255,136,0.35); }
  .project-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 4rem; position: relative; overflow: hidden; }
  .project-img-1 { background: linear-gradient(135deg, #061a2e, #0a3462); }
  .project-img-2 { background: linear-gradient(135deg, #020f1a, #062a20); }
  .project-img-3 { background: linear-gradient(135deg, #10061a, #06152a); }
  .project-img-4 { background: linear-gradient(135deg, #061a0e, #0a2e1a); }
  .project-img-5 { background: linear-gradient(135deg, #1a0620, #0a0626); }
  .project-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(6,26,46,0.9)); }
  .project-body { padding: 1.4rem; }
  .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; }
  .tag { padding: 0.2rem 0.6rem; background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; font-size: 0.7rem; color: var(--neon-green); letter-spacing: 1px; font-family: 'Orbitron', monospace; }
  .project-title { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
  .project-desc { font-size: 0.9rem; color: #7bafd4; line-height: 1.7; margin-bottom: 1rem; }
  .project-links { display: flex; gap: 0.8rem; }
  .proj-link { padding: 0.4rem 1rem; font-family: 'Orbitron', monospace; font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; border-radius: 4px; text-decoration: none; transition: all 0.3s; }
  .proj-link.demo { background: linear-gradient(135deg, var(--neon-green), #00b868); color: #020b18; }
  .proj-link.code { border: 1px solid rgba(0,255,136,0.3); color: var(--neon-green); }
  .proj-link:hover { opacity: 0.85; transform: scale(1.04); }

  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; max-width: 1000px; margin: 0 auto; }
  .contact-info h3 { font-family: 'Orbitron', monospace; font-size: 1.3rem; color: #fff; margin-bottom: 1rem; }
  .contact-info p { color: #8ab4cc; line-height: 1.8; margin-bottom: 1.8rem; }
  .contact-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; padding: 1rem 1.2rem; background: rgba(6,26,46,0.6); border: 1px solid rgba(0,255,136,0.12); border-radius: 10px; transition: border-color 0.3s; }
  .contact-item:hover { border-color: rgba(0,255,136,0.35); }
  .contact-icon { font-size: 1.4rem; }
  .contact-item-info .label { font-size: 0.75rem; color: var(--neon-green); letter-spacing: 2px; font-family: 'Orbitron', monospace; margin-bottom: 0.2rem; }
  .contact-item-info .val { font-size: 0.95rem; color: #cde8ff; }
  .contact-form { display: flex; flex-direction: column; gap: 1rem; }
  .form-group input, .form-group textarea { width: 100%; padding: 0.85rem 1.2rem; background: rgba(6,26,46,0.7); border: 1px solid rgba(0,255,136,0.15); border-radius: 8px; color: #cde8ff; font-family: 'Rajdhani', sans-serif; font-size: 1rem; transition: border-color 0.3s, box-shadow 0.3s; outline: none; }
  .form-group input:focus, .form-group textarea:focus { border-color: rgba(0,255,136,0.5); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
  .form-group textarea { height: 130px; resize: vertical; }

  footer { text-align: center; padding: 2.5rem; border-top: 1px solid rgba(0,255,136,0.1); color: var(--text-dim); font-size: 0.9rem; position: relative; z-index: 10; }
  footer span { color: var(--neon-green); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(0,255,136,0.2), inset 0 0 20px rgba(0,100,255,0.05); } 50% { box-shadow: 0 0 45px rgba(0,255,136,0.4), inset 0 0 40px rgba(0,100,255,0.15); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  @media(max-width:900px) { .about-grid, .contact-grid { grid-template-columns: 1fr; } .hero-avatar { display: none; } .about-details { grid-template-columns: 1fr; } }
  @media(max-width:600px) { .nav-links { display: none; } .projects-grid { grid-template-columns: 1fr; } }
</style>
</head>
